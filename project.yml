# Generate Xcode project on macOS: brew install xcodegen && xcodegen generate
name: YouTubeRabbitHunt
options:
  bundleIdPrefix: com.rabbithunt
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    CURRENT_PROJECT_VERSION: "2"
    MARKETING_VERSION: "1.1.0"
targets:
  YouTubeRabbitHunt:
    type: application
    platform: iOS
    sources:
      - path: YouTubeRabbitHunt
        excludes:
          - "**/.DS_Store"
    resources:
      - path: shared/element_catalog.json
    info:
      path: YouTubeRabbitHunt/Info.plist
      properties:
        CFBundleDisplayName: Rabbit Hunt
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
